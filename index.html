<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Papa 🎂</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      background: linear-gradient(-45deg,#ff758c,#ff7eb3,#a18cd1,#89f7fe);
      background-size:400% 400%;
      animation:gradientMove 12s ease infinite;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      font-family:'Poppins',sans-serif;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    /* Sparkle Background */

    .sparkle{
      position:absolute;
      width:4px;
      height:4px;
      background:white;
      border-radius:50%;
      animation:sparkleAnim linear infinite;
      opacity:0.8;
    }

    @keyframes sparkleAnim{
      from{
        transform:translateY(0px) scale(0.5);
        opacity:0;
      }
      to{
        transform:translateY(-100vh) scale(1.5);
        opacity:1;
      }
    }

    /* Main Card */

    .container{
      width:90%;
      max-width:700px;
      padding:40px;
      border-radius:30px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 8px 40px rgba(0,0,0,0.25);
      text-align:center;
      position:relative;
      z-index:5;
      overflow:hidden;
      animation:cardEntry 1.8s ease;
    }

    @keyframes cardEntry{
      from{
        transform:translateY(80px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
    }

    .title{
      font-family:'Great Vibes',cursive;
      font-size:4rem;
      color:white;
      text-shadow:
        0 0 10px rgba(255,255,255,0.9),
        0 0 25px rgba(255,182,193,0.8);
      margin-bottom:10px;
      animation:glow 2s infinite alternate;
    }

    @keyframes glow{
      from{
        text-shadow:
          0 0 10px white,
          0 0 20px pink;
      }
      to{
        text-shadow:
          0 0 20px white,
          0 0 40px #ff4da6;
      }
    }

    .subtitle{
      color:white;
      font-size:1.3rem;
      margin-bottom:30px;
      letter-spacing:1px;
      font-weight:300;
    }

    /* Calendar */

    .calendar-box{
      margin:auto;
      padding:25px;
      width:fit-content;
      border-radius:25px;
      background:rgba(255,255,255,0.15);
      box-shadow:0 0 20px rgba(255,255,255,0.15);
      transition:0.5s;
    }

    .calendar-box:hover{
      transform:scale(1.05);
      box-shadow:0 0 35px rgba(255,255,255,0.4);
    }

    input[type="date"]{
      padding:16px 22px;
      border:none;
      border-radius:18px;
      outline:none;
      font-size:18px;
      background:white;
      color:#444;
      font-weight:600;
      cursor:pointer;
      transition:0.4s;
      font-family:'Poppins',sans-serif;
    }

    input[type="date"]:hover{
      transform:scale(1.04);
    }

    /* Birthday Message */

    .birthday-message{
      margin-top:40px;
      display:none;
      animation:popup 1.5s ease forwards;
    }

    @keyframes popup{
      from{
        opacity:0;
        transform:scale(0.3) rotate(-10deg);
      }
      to{
        opacity:1;
        transform:scale(1) rotate(0deg);
      }
    }

    .birthday-message h2{
      font-family:'Great Vibes',cursive;
      font-size:5rem;
      color:white;
      line-height:1.2;
      text-shadow:
        0 0 15px #fff,
        0 0 35px #ff66c4,
        0 0 60px #ffd700;
      animation:floatText 3s ease-in-out infinite;
    }

    @keyframes floatText{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    .birthday-message p{
      margin-top:20px;
      color:white;
      font-size:1.3rem;
      line-height:1.8;
      font-weight:300;
      animation:fadeIn 3s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    /* Floating Hearts */

    .heart{
      position:absolute;
      color:white;
      font-size:25px;
      animation:heartFloat linear infinite;
      opacity:0.8;
    }

    @keyframes heartFloat{
      from{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }
      to{
        transform:translateY(-120vh) scale(1.5);
        opacity:1;
      }
    }

    /* Responsive */

    @media(max-width:768px){

      .title{
        font-size:3rem;
      }

      .birthday-message h2{
        font-size:3rem;
      }

      .subtitle{
        font-size:1rem;
      }

      .birthday-message p{
        font-size:1rem;
      }

    }

  </style>
</head>

<body>

  <!-- Sparkles -->
  <script>
    for(let i=0;i<80;i++){
      const sparkle=document.createElement('div');
      sparkle.classList.add('sparkle');

      sparkle.style.left=Math.random()*100+'vw';
      sparkle.style.top=Math.random()*100+'vh';
      sparkle.style.animationDuration=(Math.random()*5+3)+'s';
      sparkle.style.animationDelay=Math.random()*5+'s';

      document.body.appendChild(sparkle);
    }
  </script>

  <!-- Hearts -->
  <script>
    for(let i=0;i<25;i++){
      const heart=document.createElement('div');
      heart.classList.add('heart');

      heart.innerHTML='❤';
      heart.style.left=Math.random()*100+'vw';
      heart.style.animationDuration=(Math.random()*6+4)+'s';
      heart.style.fontSize=(Math.random()*20+15)+'px';

      document.body.appendChild(heart);
    }
  </script>

  <!-- Main Content -->

  <div class="container">

    <div class="title">Birthday Surprise ✨</div>

    <div class="subtitle">
      Select Today's Date To Open A Special Wish 🎁
    </div>

    <div class="calendar-box">
      <input type="date" id="datePicker">
    </div>

    <div class="birthday-message" id="birthdayMessage">

      <h2>
        🎂 Happy Birthday Papa 🎂
      </h2>

      <p>
        Thank you for being my strength, my inspiration,
        and my biggest support ❤️<br><br>

        Your love means the world to me ✨<br>
        Wishing you endless happiness, health,
        and beautiful memories 🎉
      </p>

    </div>

  </div>

  <!-- Music -->

  <audio id="music" loop>
    <source src="https://www.orangefreesounds.com/wp-content/uploads/2016/08/Happy-birthday-instrumental.mp3" type="audio/mpeg">
  </audio>

  <script>

    const datePicker = document.getElementById('datePicker');
    const birthdayMessage = document.getElementById('birthdayMessage');
    const music = document.getElementById('music');

    datePicker.addEventListener('change',()=>{

      const selectedDate = new Date(datePicker.value);
      const today = new Date();

      if(
        selectedDate.getDate()===today.getDate() &&
        selectedDate.getMonth()===today.getMonth() &&
        selectedDate.getFullYear()===today.getFullYear()
      ){

        birthdayMessage.style.display='block';

        music.play();

        // Confetti

        for(let i=0;i<120;i++){

          const confetti=document.createElement('div');

          confetti.style.position='absolute';
          confetti.style.width='10px';
          confetti.style.height='10px';
          confetti.style.background=
            ['#ff0','#ff4da6','#00e5ff','#fff','#7CFC00']
            [Math.floor(Math.random()*5)];

          confetti.style.left=Math.random()*100+'vw';
          confetti.style.top='-10px';
          confetti.style.opacity=Math.random();

          confetti.style.animation=
            `fall ${Math.random()*3+2}s linear`;

          confetti.style.borderRadius='50%';

          document.body.appendChild(confetti);

          confetti.animate([
            {transform:'translateY(0) rotate(0deg)'},
            {transform:'translateY(110vh) rotate(720deg)'}
          ],{
            duration:Math.random()*3000+2000,
            iterations:1
          });

          setTimeout(()=>{
            confetti.remove();
          },5000);

        }

      }else{
        birthdayMessage.style.display='none';
      }

    });

  </script>

</body>
</html>
